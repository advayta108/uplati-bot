name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Таймаут 10 минут для завершения задания

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        ref: main
        fetch-depth: 0

    - name: Set environment variables
      run: |
        echo "SERVER_IP=${{ secrets.SERVER_IP }}" >> $GITHUB_ENV
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
        echo "NODE_ENV=production" >> $GITHUB_ENV  # Указываем режим production

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Test SSH connection
      run: |
        echo "Testing SSH connection to server..."
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p 22 root@$SERVER_IP 'echo "SSH connection successful" && hostname && whoami' || {
          echo "❌ SSH connection failed!"
          echo "Please check:"
          echo "1. SERVER_IP secret is correct"
          echo "2. SSH_PRIVATE_KEY secret is correct"
          echo "3. Server is accessible from GitHub Actions runner"
          exit 1
        }

    - name: Stop and remove docker-compose services on server
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p 22 root@$SERVER_IP '
          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi &&
          cd /home/github/ts-uplati-bot-main || mkdir -p /home/github/ts-uplati-bot-main &&
          cd /home/github/ts-uplati-bot-main &&
          mkdir -p backups &&
          if [ -f data/users.db ]; then
            TS=$(date +%Y%m%d-%H%M%S) &&
            cp data/users.db "backups/users-${TS}.db" &&
            echo "✅ DB backup created: backups/users-${TS}.db";
          else
            echo "ℹ️ No users.db found, skipping backup";
          fi &&
          find backups -type f -name "users-*.db" -mtime +14 -delete || true &&
          $COMPOSE_CMD -f docker-compose.prod.yml down || true &&
          pkill -f "tsx.*telebot" || true &&
          pkill -f "npm.*bot" || true &&
          sleep 2' || {
          echo "⚠️ Warning: Some cleanup commands failed, continuing..."
        }

    - name: Create directory on server
      run: |
        ssh -o StrictHostKeyChecking=no -p 22 root@$SERVER_IP '
          mkdir -p /home/github/ts-uplati-bot-main &&
          mkdir -p /home/github/ts-uplati-bot-main/data &&
          mkdir -p /home/github/ts-uplati-bot-main/logs'  # Создаем необходимые директории

    - name: Clean docker build cache on server
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p 22 root@$SERVER_IP '
          echo "Cleaning docker builder cache..." &&
          docker builder prune -af || true &&
          echo "Removing dangling images..." &&
          docker image prune -af || true'

    - name: Copy repository to server
      run: |
        echo "Copying files to server..."
        tar --exclude=.git --exclude=node_modules --exclude=build --exclude=dist --exclude=.env -czf - . \
          | ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p 22 root@$SERVER_IP \
          'tar -xzf - -C /home/github/ts-uplati-bot-main' || {
          echo "❌ Failed to copy files to server"
          exit 1
        }
        echo "✅ Files copied successfully"

    - name: Set permissions for docker-compose files
      run: |
        ssh -o StrictHostKeyChecking=no -p 22 root@$SERVER_IP '
          cd /home/github/ts-uplati-bot-main &&
          chmod +x docker-compose.prod.yml'

    - name: Build and run containers with docker-compose
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p 22 root@$SERVER_IP '
          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi &&
          cd /home/github/ts-uplati-bot-main &&
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env &&
          echo "SEND_DATA=true" >> .env &&
          echo "NODE_ENV=production" >> .env &&
          echo "✅ .env file created" &&
          $COMPOSE_CMD -f docker-compose.prod.yml up -d --build --remove-orphans &&
          echo "✅ Containers started" &&
          sleep 5 &&
          $COMPOSE_CMD -f docker-compose.prod.yml logs --tail=50' || {
          echo "❌ Failed to build or start containers"
          exit 1
        }

    - name: Check running containers
      run: |
        ssh -o StrictHostKeyChecking=no -p 22 root@$SERVER_IP '
          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi &&
          cd /home/github/ts-uplati-bot-main &&
          echo "=== Bot container status ===" &&
          $COMPOSE_CMD -f docker-compose.prod.yml ps &&
          echo "=== Recent startup logs ===" &&
          $COMPOSE_CMD -f docker-compose.prod.yml logs --tail=20 ts-uplati-bot-docker'  # Проверяем статус
