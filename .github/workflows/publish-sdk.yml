name: Publish SDK to npm

on:
  push:
    branches:
      - release
    tags:
      - "sdk-v*"
  workflow_dispatch:

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build:lib

      - name: Check if SDK version already published
        id: version_check
        shell: bash
        run: |
          VERSION=$(node -p "require('./lib/uplati-sdk/package.json').version")
          echo "sdk_version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@advayta108/uplati-sdk@$VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is already published. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is not published yet. Will publish."
          fi

      - name: Pack SDK (status on push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/release'
        run: npm run pack:lib

      - name: Publish SDK
        if: ((github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/sdk-v'))) || github.event_name == 'workflow_dispatch') && steps.version_check.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            echo "Publish attempt $attempt..."
            if npm run publish:lib; then
              echo "Publish succeeded."
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              echo "Publish failed (possible npm processing delay). Retrying in 30s..."
              sleep 30
            fi
          done
          echo "Publish failed after 4 attempts."
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
