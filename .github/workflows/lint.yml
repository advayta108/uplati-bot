name: Lint

on:
    push:
      branches:
        - main
    pull_request:
     branches:
        - main
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '25'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
