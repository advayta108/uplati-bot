name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '25'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for runner Node.js
        run: npm rebuild better-sqlite3

      - name: Build application
        run: npm run build

      - name: Build SDK
        run: npm run build:lib

      - name: Lint
        run: npm run lint

      - name: Tests (Vitest + интеграция API при заданных secrets)
        env:
          CI: 'true'
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASS: ${{ secrets.TEST_USER_PASS }}
        run: npm run test
